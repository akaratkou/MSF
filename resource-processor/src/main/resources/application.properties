spring.application.name=resource-processor
server.port=${APP_PORT:8090}

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=5

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.queue.resource-uploaded=resource.uploaded
rabbitmq.exchange.resource=resource.exchange
rabbitmq.routing-key.resource-uploaded=resource.uploaded

# Downstream service names (resolved via Eureka)
services.resource-service.name=${RESOURCE_SERVICE_NAME:resource-service}
services.song-service.name=${SONG_SERVICE_NAME:song-service}

# Spring AMQP listener retry (second layer - if ResourceProcessingService @Recover rethrows)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=15000

# === ACTUATOR ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true